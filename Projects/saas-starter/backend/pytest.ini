[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
testpaths = tests
addopts = 
    -v
    --tb=short
    --strict-markers
    --cov=billing
    --cov=users
    --cov=api
    --cov-report=html
    --cov-report=term-missing

markers =
    django_db: marks tests as needing database access
    slow: marks tests as slow
